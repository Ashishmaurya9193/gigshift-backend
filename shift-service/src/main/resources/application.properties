# H2 console (disabled here)
# ===============================
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ===============================
# Datasource (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/shift_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=shift_user
spring.application.name=shift_user
spring.datasource.password=Casper

# ===============================
# Redis (cart + locking)
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=1

# Use the MySQL dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# JPA / Hibernate
# ===============================
# Automatically update schema for dev
spring.jpa.hibernate.ddl-auto=update

#================================
#Elastic Search Configuration
#================================
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=
spring.elasticsearch.password=

# ===============================
# Messaging
# ===============================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.bootstrap-servers=localhost:9092

# ===============================
# Audit service client
# ===============================
audit.service.base-url=http://localhost:8085